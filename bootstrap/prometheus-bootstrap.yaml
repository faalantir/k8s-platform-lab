apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 25.21.0
    helm:
      values: |
        server:
          persistentVolume:
            enabled: false
          retention: 2d
          global:
            scrape_interval: 1m
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
        # Disable heavy components we don't need for the MVP
        alertmanager:
          enabled: false
        pushgateway:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
